<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Medical Report</title>

    <style>
        body {
            font-family: Arial;
            font-size: 12px;
        }

        .header {
            text-align: center;
        }

        hr {
            margin: 10px 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid black;
            padding: 5px;
        }

        th {
            background-color: #f2f2f2;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>Hybrid Medical Consultancy</h2>
    <p>Patient Symptom Report</p>
</div>

<hr>

{% block content %}{% endblock %}

<div class="footer">
    Generated automatically
</div>

</body>
</html>
