{% extends "layout.html" %}
{% block content %}

<div style="max-width:600px; margin:50px auto; padding:30px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
    <h2 style="color:#2c3e50; margin-bottom:20px;">Book an Appointment</h2>

    <!-- Show Fee -->
    {% if form.instance.fee %}
    <p style="margin-bottom:15px;">Appointment Fee: <strong>${{ form.instance.fee }}</strong></p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width:100%; padding:10px; background:#3498db; color:white; border:none; border-radius:5px; font-size:16px;">
            Book Appointment & Pay
        </button>
    </form>
</div>

{% endblock %}
