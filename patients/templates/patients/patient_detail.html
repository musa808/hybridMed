{% extends "layout.html" %}

{% block content %}
<div style="max-width:700px; margin:40px auto; padding:20px; background:white; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">

    <h2 style="color:#2c3e50; margin-bottom:20px;">Patient Details</h2>

    <div style="line-height:1.8; color:#34495e; font-size:16px;">
        <p><strong>Name:</strong> {{ patient.first_name }} {{ patient.last_name }}</p>
        <p><strong>Email:</strong> {{ patient.email }}</p>
        <p><strong>Phone:</strong> {{ patient.phone }}</p>
        <p><strong>Date of Birth:</strong> {{ patient.date_of_birth }}</p>
    </div>

    <a href="{% url 'patients:patient_list' %}" 
       style="display:inline-block; margin-top:20px; padding:10px 20px; background:#3498db; color:white; border-radius:6px; text-decoration:none; transition:0.3s;">
       ← Back to Patient List
    </a>

</div>

{% endblock %}
