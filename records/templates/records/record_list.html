{% extends "layout.html"%}
{% block content %}
<div style="max-width:1000px; margin:40px auto; padding:20px;">

    <h2 style="color:#2c3e50; margin-bottom:20px;">Medical Records</h2>

    <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse;">
            <thead>
                <tr style="background:#3498db; color:white; text-align:left;">
                    <th style="padding:12px;">Patient</th>
                    <th style="padding:12px;">Prescription</th>
                    <th style="padding:12px;">Date</th>
                </tr>
            </thead>
            <tbody>
                {% for record in records %}
                <tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:12px;">{{ record.patient }}</td>
                    <td style="padding:12px;">{{ record.prescription|truncatechars:50 }}</td>
                    <td style="padding:12px;">{{ record.created_at|date:"M d, Y" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="text-align:center; padding:15px; color:#7f8c8d;">No records found</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>
{% endblock %}
